name: clinical-triage-env
version: "1.0.0"
description: >
  A real-world Emergency Department triage environment where an AI agent
  must assess patients, order diagnostics, assign acuity levels, and make
  disposition decisions under time pressure and resource constraints.
  Simulates six clinical scenarios spanning STEMI, PE workup, mass casualty,
  sepsis, stroke, and pediatric respiratory emergencies.
author: "Team Unfazed"
tags:
  - openenv
  - healthcare
  - clinical-decision-making
  - triage
  - reinforcement-learning
  - emergency-medicine
entry_point: clinical_triage_env.app:app
tasks:
  - id: task_stemi_code
    difficulty: easy
    description: "Clear STEMI presentation. Agent must activate cath lab pathway within time window."
    max_steps: 15
  - id: task_chest_pain_workup
    difficulty: medium
    description: "Ambiguous chest pain with PE risk factors. Agent must navigate differential diagnosis with ordered test sequencing."
    max_steps: 20
  - id: task_mci_surge
    difficulty: hard
    description: "Mass casualty: 5 simultaneous patients, 3 beds. Agent must correctly triage under resource scarcity."
    max_steps: 25
  - id: task_sepsis_alert
    difficulty: medium
    description: "68yo with fever, hypotension, and altered mental status. Agent must recognize and respond to severe sepsis."
    max_steps: 20
  - id: task_stroke_code
    difficulty: hard
    description: "72yo with sudden onset facial droop and right-sided weakness. Time critical."
    max_steps: 18
  - id: task_pediatric_resp
    difficulty: medium
    description: "4yo with severe asthma exacerbation and retractions."
    max_steps: 18
observation_type: clinical_triage_env.models.TriageObservation
action_type: clinical_triage_env.models.TriageAction
reward_range: [-1.0, 1.0]
baseline_scores:
  task_stemi_code: 0.72
  task_chest_pain_workup: 0.48
  task_mci_surge: 0.31
  task_sepsis_alert: 0.60
  task_stroke_code: 0.55
  task_pediatric_resp: 0.65
